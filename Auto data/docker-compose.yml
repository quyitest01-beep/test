version: '3.8'

services:
  gmp-api:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gmp-api.rule=Host(`gmp-gmp-hxlxyr-9d2ede-18-141-240-9.traefik.me`)"
      - "traefik.http.routers.gmp-api.entrypoints=websecure"
      - "traefik.http.routers.gmp-api.tls=true"
      - "traefik.http.services.gmp-api.loadbalancer.server.port=8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      # AWS配置
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      # Athena配置
      - ATHENA_DATABASE=${ATHENA_DATABASE}
      - ATHENA_OUTPUT_LOCATION=${ATHENA_OUTPUT_LOCATION}
      - ATHENA_WORKGROUP=${ATHENA_WORKGROUP}
      # API配置
      - API_KEY=${API_KEY}
      - FRONTEND_URL=https://gmp-gmp-hxlxyr-9d2ede-18-141-240-9.traefik.me
      # Lark配置
      - LARK_APP_ID=cli_a9978e93ce389ed2
      - LARK_APP_SECRET=D3krx1JapAYPIeLjCdROi6OvF8hnV2wL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend/exports:/app/exports
      - ./backend/logs:/app/logs