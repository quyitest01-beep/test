<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .module { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .core-module { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 8; }
      .data-module { fill: #e8f5e8; stroke: #388e3c; stroke-width: 2; rx: 8; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; text-anchor: middle; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #666; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="25" class="title">自动化查数/导数/发送工具 - 系统架构图</text>
  
  <!-- User Interface Layer -->
  <rect x="50" y="50" width="700" height="80" class="module" />
  <text x="400" y="75" class="text">用户界面层 (User Interface Layer)</text>
  <text x="150" y="95" class="small-text">仪表板</text>
  <text x="250" y="95" class="small-text">模板管理</text>
  <text x="350" y="95" class="small-text">任务执行</text>
  <text x="450" y="95" class="small-text">历史记录</text>
  <text x="550" y="95" class="small-text">系统设置</text>
  <text x="650" y="95" class="small-text">可视化设计器</text>
  
  <!-- Business Logic Layer -->
  <rect x="50" y="160" width="700" height="200" class="core-module" />
  <text x="400" y="185" class="text">业务逻辑层 (Business Logic Layer)</text>
  
  <!-- Scenario Template System -->
  <rect x="70" y="200" width="150" height="60" class="module" />
  <text x="145" y="220" class="small-text">场景规则模板系统</text>
  <text x="145" y="235" class="small-text">• 预设模板管理</text>
  <text x="145" y="250" class="small-text">• 自定义规则配置</text>
  
  <!-- Workflow Engine -->
  <rect x="240" y="200" width="150" height="60" class="module" />
  <text x="315" y="220" class="small-text">流程配置引擎</text>
  <text x="315" y="235" class="small-text">• 工作流管理</text>
  <text x="315" y="250" class="small-text">• 节点执行控制</text>
  
  <!-- Query Module -->
  <rect x="410" y="200" width="120" height="60" class="module" />
  <text x="470" y="220" class="small-text">数据查询模块</text>
  <text x="470" y="235" class="small-text">• 参数解析</text>
  <text x="470" y="250" class="small-text">• SQL执行</text>
  
  <!-- Export Module -->
  <rect x="550" y="200" width="120" height="60" class="module" />
  <text x="610" y="220" class="small-text">数据导出模块</text>
  <text x="610" y="235" class="small-text">• 格式转换</text>
  <text x="610" y="250" class="small-text">• 模板渲染</text>
  
  <!-- Send Module -->
  <rect x="70" y="280" width="120" height="60" class="module" />
  <text x="130" y="300" class="small-text">数据发送模块</text>
  <text x="130" y="315" class="small-text">• 多协议支持</text>
  <text x="130" y="330" class="small-text">• 状态跟踪</text>
  
  <!-- Config Module -->
  <rect x="210" y="280" width="120" height="60" class="module" />
  <text x="270" y="300" class="small-text">配置管理模块</text>
  <text x="270" y="315" class="small-text">• 权限控制</text>
  <text x="270" y="330" class="small-text">• 系统配置</text>
  
  <!-- Logging Module -->
  <rect x="350" y="280" width="120" height="60" class="module" />
  <text x="410" y="300" class="small-text">日志监控模块</text>
  <text x="410" y="315" class="small-text">• 操作审计</text>
  <text x="410" y="330" class="small-text">• 性能监控</text>
  
  <!-- Message Queue -->
  <rect x="490" y="280" width="120" height="60" class="module" />
  <text x="550" y="300" class="small-text">消息队列</text>
  <text x="550" y="315" class="small-text">• 异步任务</text>
  <text x="550" y="330" class="small-text">• 状态通知</text>
  
  <!-- Cache Layer -->
  <rect x="630" y="280" width="100" height="60" class="module" />
  <text x="680" y="300" class="small-text">缓存层</text>
  <text x="680" y="315" class="small-text">• Redis</text>
  <text x="680" y="330" class="small-text">• 结果缓存</text>
  
  <!-- Data Layer -->
  <rect x="50" y="390" width="700" height="120" class="data-module" />
  <text x="400" y="415" class="text">数据层 (Data Layer)</text>
  
  <!-- Database -->
  <rect x="100" y="440" width="150" height="50" class="module" />
  <text x="175" y="460" class="small-text">主数据库</text>
  <text x="175" y="475" class="small-text">MySQL 8.0+</text>
  
  <!-- External Data Sources -->
  <rect x="280" y="440" width="150" height="50" class="module" />
  <text x="355" y="460" class="small-text">外部数据源</text>
  <text x="355" y="475" class="small-text">PostgreSQL/Oracle/MongoDB</text>
  
  <!-- File Storage -->
  <rect x="460" y="440" width="120" height="50" class="module" />
  <text x="520" y="460" class="small-text">文件存储</text>
  <text x="520" y="475" class="small-text">MinIO</text>
  
  <!-- External Services -->
  <rect x="600" y="440" width="120" height="50" class="module" />
  <text x="660" y="460" class="small-text">外部服务</text>
  <text x="660" y="475" class="small-text">邮件/FTP/API</text>
  
  <!-- Infrastructure Layer -->
  <rect x="50" y="530" width="700" height="50" class="module" />
  <text x="400" y="555" class="text">基础设施层: Docker + Nginx + Prometheus + Grafana + ELK Stack</text>
  
  <!-- Arrows -->
  <line x1="400" y1="130" x2="400" y2="160" class="arrow" />
  <line x1="400" y1="360" x2="400" y2="390" class="arrow" />
  <line x1="400" y1="510" x2="400" y2="530" class="arrow" />
  
</svg>